# SwiftLint configuration for MacPullToRefresh.
# Lints the hand-written sources and tests; the SwiftPM build directory holds
# generated code (e.g. the test entry point) that we never want to lint.

included:
  - Sources
  - Tests

excluded:
  - .build

disabled_rules:
  # The package is deliberately a single-file library: the gesture state machine,
  # its view modifiers, and the spinner are one cohesive unit, and splitting them
  # across files to satisfy a line count would obscure that rather than clarify it.
  - file_length

identifier_name:
  # Short names are idiomatic in a small mathematical scope — `t` for elapsed time
  # in the angle calculation. The default three-character minimum would force a
  # name like `elapsed` into a two-line function where `t` is clearer.
  min_length:
    warning: 1
    error: 1
